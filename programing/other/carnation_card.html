<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스승의날 카드 — 이재백쌤에게</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;background:#1a0a0e;
    display:flex;align-items:center;justify-content:center;
    font-family:'Nanum Gothic',sans-serif;overflow:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 20% 50%,rgba(240,96,144,0.15) 0%,transparent 60%),
               radial-gradient(ellipse at 80% 20%,rgba(240,96,144,0.15) 0%,transparent 50%);
  }
  .card{
    position:relative;width:420px;background:#2d0d18;
    border:1px solid rgba(240,96,144,0.35);border-radius:24px;padding:48px 44px 44px;
    box-shadow:0 0 60px rgba(240,96,144,0.35),0 0 120px rgba(240,96,144,0.15),
               inset 0 1px 0 rgba(255,220,230,0.08);
    animation:fadeUp 1s ease both;
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(30px)}
    to{opacity:1;transform:translateY(0)}
  }
  .flower-wrap{display:flex;justify-content:center;margin-bottom:32px;
    animation:fadeUp 1s 0.2s ease both;opacity:0}
  .date{font-size:11px;letter-spacing:4px;color:rgba(240,96,144,0.5);
    text-align:center;margin-bottom:10px;
    animation:fadeUp 1s 0.4s ease both;opacity:0}
  .to{font-family:'Nanum Myeongjo',serif;font-size:26px;color:#ffb0e0;
    text-align:center;margin-bottom:24px;
    animation:fadeUp 1s 0.5s ease both;opacity:0}
  .to span{color:#f06090;font-weight:700}
  .divider{width:48px;height:1px;margin:0 auto 24px;
    background:linear-gradient(90deg,transparent,rgba(240,96,144,0.35),transparent);
    animation:fadeUp 1s 0.6s ease both;opacity:0}
  .message{font-family:'Nanum Myeongjo',serif;font-size:16px;line-height:2;
    color:rgba(255,226,255,0.85);text-align:center;
    animation:fadeUp 1s 0.7s ease both;opacity:0}
  .from{margin-top:32px;text-align:right;font-size:13px;
    color:rgba(240,96,144,0.5);letter-spacing:1px;
    animation:fadeUp 1s 0.9s ease both;opacity:0}
  .corner{position:absolute;width:20px;height:20px;
    border-color:rgba(240,96,144,0.35);border-style:solid}
  .tl{top:16px;left:16px;border-width:1px 0 0 1px}
  .tr{top:16px;right:16px;border-width:1px 1px 0 0}
  .bl{bottom:16px;left:16px;border-width:0 0 1px 1px}
  .br{bottom:16px;right:16px;border-width:0 1px 1px 0}
  .petal{position:fixed;border-radius:50% 50% 50% 0;
    animation:fall linear infinite;pointer-events:none}
  @keyframes fall{
    0%{transform:translateY(-20px) rotate(0deg);}
    100%{transform:translateY(110vh) rotate(360deg);opacity:0}
  }
  /* 스크린샷 안내 버튼 */
  .guide{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,0.08);border:1px solid rgba(240,96,144,0.35);
    border-radius:12px;padding:12px 24px;text-align:center;
    font-family:'Nanum Gothic',sans-serif;
  }
  .guide p{font-size:13px;color:rgba(255,220,230,0.7);line-height:1.8}
  .guide strong{color:#ff9ccc;}
</style>
</head>
